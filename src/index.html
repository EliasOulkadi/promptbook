<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Promptbook</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav id="sidebar">
  <div class="sb-top">
    <span class="sb-wordmark">Promptbook</span>
  </div>

  <div class="sb-search" onclick="document.getElementById('srch').focus()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Search
    <span style="margin-left:auto;font-size:11px">Ctrl+K</span>
  </div>

  <div class="sb-section">
    <div class="nav-item on" data-v="all" onclick="setView('all',this)">
      <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      All prompts
      <span class="nav-n" id="n-all">0</span>
    </div>
    <div class="nav-item" data-v="pinned" onclick="setView('pinned',this)">
      <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Pinned
      <span class="nav-n" id="n-pin">0</span>
    </div>
    <div class="nav-item" data-v="recent" onclick="setView('recent',this)">
      <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Recently used
      <span class="nav-n" id="n-rec">0</span>
    </div>
    <div class="nav-item" data-v="community" onclick="setView('community',this)">
      <svg class="nav-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Community
    </div>
  </div>

  <div class="sb-divider"></div>
  <div class="sb-lbl">Tags</div>
  <div class="sb-tags" id="tag-list"></div>

  <div class="sb-foot" style="display:flex; justify-content:space-between; align-items:center;">
    <span id="foot-count">0 prompts</span>
    <button class="btn btn-ghost" id="login-btn" onclick="window.api.login()" style="font-size:11px; height:24px; padding:0 8px;">Login</button>
  </div>
</nav>

<div id="main">
  <div id="topbar">
    <span class="tb-title" id="view-lbl">All prompts</span>
    <span class="tb-count" id="tb-count">0</span>
    <div class="tb-right">
      <input id="srch" type="search" placeholder="Search…" oninput="onSearch(this.value)">
      <button class="btn btn-solid" onclick="openModal()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        New prompt
      </button>
    </div>
    <div id="wc">
      <button class="wc-btn" id="wc-min" onclick="window.pb.minimize()">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1.5" fill="currentColor"/></svg>
      </button>
      <button class="wc-btn" id="wc-max" onclick="window.pb.maximize()">
        <svg id="wc-max-ic" width="10" height="10" viewBox="0 0 10 10"><rect x=".6" y=".6" width="8.8" height="8.8" rx="0" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="wc-btn wc-close" onclick="window.pb.close()">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.4"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
    </div>
  </div>

  <div id="content">
    <div id="empty" style="display:none">
      <h3>No prompts yet</h3>
      <p>Save prompts you use often and copy them instantly when you need them.</p>
      <button class="btn btn-solid" style="margin-top:6px" onclick="openModal()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        New prompt
      </button>
    </div>
    <div id="no-results" style="display:none"><p>No results.</p></div>

    <div id="list-wrap" style="display:none">
      <div class="list-head">
        <div class="lh-id">ID</div>
        <div class="lh-name">Name</div>
        <div class="lh-tags">Tags</div>
        <div class="lh-uses">Uses</div>
      </div>
      <div id="list"></div>
    </div>
  </div>
</div>

<div id="drawer">
  <div class="dr-top">
    <span class="dr-id" id="d-id"></span>
    <div class="dr-acts">
      <button class="d-btn" id="d-pin" onclick="togglePin()">Pin</button>
      <button class="d-btn" onclick="editCurrent()">Edit</button>
      <button class="d-btn del" onclick="delCurrent()">Delete</button>
      <button class="d-btn d-icon" onclick="closeDrawer()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <div class="dr-body">
    <div class="dr-title" id="d-title"></div>
    <div class="dr-tags" id="d-tags"></div>
    <div class="dr-lbl">Prompt</div>
    <div class="dr-text" id="d-text"></div>
    <div class="dr-lbl">Details</div>
    <div class="dr-meta" id="d-meta"></div>
  </div>
  <div class="dr-foot">
    <button class="copy-btn" id="d-copy" onclick="copyDrawer()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy to clipboard
    </button>
  </div>
</div>

<div class="backdrop" id="backdrop" onclick="bgClose(event)">
  <div class="modal">
    <div class="m-head">
      <span class="m-ttl" id="m-ttl">New prompt</span>
      <button class="m-x" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body">
      <div class="field">
        <label>Name</label>
        <input id="f-name" type="text" placeholder="Give it a short name" maxlength="80">
      </div>
      <div class="field">
        <label>Prompt</label>
        <textarea id="f-text" placeholder="Paste your prompt here" oninput="updChar()"></textarea>
        <div class="char-n" id="char-n">0 chars</div>
      </div>
      <div class="field">
        <label>Tags <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3)">— comma separated</span></label>
        <input id="f-tags" type="text" placeholder="code, writing, work…">
      </div>
      <div class="field" style="display:flex; align-items:center; gap:8px; margin-top:4px;">
        <input type="checkbox" id="f-public" style="width:16px; height:16px;">
        <label for="f-public" style="margin:0; text-transform:none; font-size:13px; color:var(--text-2);">Make this prompt public (Community)</label>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-solid" onclick="savePrompt()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
